name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run type-check

      # If you have tests:
      # - name: Test
      #   run: npm test -- --ci

      - name: Build
        run: npm run build
        env:
          # Add any vars required at build time (usually none for Next unless you read env at import time)
          # NEXT_PUBLIC_* vars go here if needed
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # If you do NOT want secrets in CI build, remove ANTHROPIC_API_KEY and ensure build never requires it.
